
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chriss Trading Hub</title>

<style>
:root{
  --bg:#05070d;
  --card:#0b1220;
  --gold:#d4af37;
  --gold2:#ffcc33;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box;font-family:Arial}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#111827,#020617);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* glow animation */
@keyframes glow{
  0%{box-shadow:0 0 10px rgba(212,175,55,.2)}
  50%{box-shadow:0 0 30px rgba(212,175,55,.5)}
  100%{box-shadow:0 0 10px rgba(212,175,55,.2)}
}

.container{
  width:450px;
  text-align:center;
}

.card{
  background:linear-gradient(145deg,#0b1220,#020617);
  border:1px solid rgba(212,175,55,.25);
  border-radius:18px;
  padding:25px;
  animation:glow 4s infinite;
}

h1{
  color:var(--gold);
  margin-bottom:5px;
}

p{
  color:var(--muted);
  font-size:13px;
}

.link{
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  color:#0b1220;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  transition:.3s;
}

.link:hover{
  transform:scale(1.05);
}

.small{
  margin-top:10px;
  font-size:11px;
  color:var(--muted);
}
</style>
</head>

<body>
